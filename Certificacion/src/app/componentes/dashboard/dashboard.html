<div class="dashboard-container">

  <div class="sidebar">
    <h2>EduMaster</h2>

    <ul>
      <li routerLink="/">Inicio</li>
      <li routerLink="/alumnos">Alumnos</li>
      <li routerLink="/cursos">Cursos</li>
      <li routerLink="/tareas">Tareas</li>
      <li (click)="cerrarSesion()">Cerrar sesión</li>
    </ul>
  </div>

  <div class="main-content">

    <!-- 🔥 USUARIO DINÁMICO -->
    <h1>
      Bienvenido, {{ usuario?.usuario }}
    </h1>

    <p>Panel de control académico</p>

    <div class="cards">

      <!-- ALUMNOS -->
      <div class="card">
        <h3>Alumnos</h3>
        <p>{{ totalAlumnos() }}</p>
      </div>

      <!-- CURSOS -->
      <div class="card">
        <h3>Cursos</h3>
        <p>{{ totalCursos() }}</p>
      </div>

      <!-- TAREAS (opcional) -->
      <div class="card">
        <h3>Tareas</h3>
        <p>{{ totalTareas() }}</p>
      </div>

    </div>

  </div>

</div>
